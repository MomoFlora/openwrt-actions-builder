name: Build releases

on:
  repository_dispatch:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.model }}
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        model: ["X86_64", "Rockchip", "IPQ60XX", "IPQ807X", "MT7981", "MT7986"]
        include:
          - model: "X86_64"
            label: "Lede"
            repo_branch: "master"
            repo_url: "https://github.com/coolsnowwolf/lede"
            openwrt_file: "X86_64-Lede/files"
            config_file: "X86_64-Lede/X86_64.config"
            feeds_conf: "X86_64-Lede/feeds.conf.default"
            custom_script: "X86_64-Lede/diy-script.sh"
            cache_toolchain: "true"
            clash_kernel: "amd64"

          - model: "Rockchip"
            label: "Lede"
            repo_branch: "master"
            repo_url: "https://github.com/coolsnowwolf/lede"
            openwrt_file: "Rockchip-Lede/files"
            config_file: "Rockchip-Lede/Rockchip.config"
            feeds_conf: "Rockchip-Lede/feeds.conf.default"
            custom_script: "Rockchip-Lede/diy-script.sh"
            cache_toolchain: "true"
            clash_kernel: "arm64"

          - model: "IPQ60XX"
            label: "LiBwrt"
            repo_branch: "main-nss"
            repo_url: "https://github.com/LiBwrt/openwrt-6.x"
            openwrt_file: "IPQ60XX-LiBwrt/files"        
            config_file: "IPQ60XX-LiBwrt/IPQ60XX.config"
            feeds_conf: "IPQ60XX-LiBwrt/feeds.conf.default"
            custom_script: "IPQ60XX-LiBwrt/diy-script.sh"
            cache_toolchain: "true"

          - model: "IPQ807X"
            label: "LiBwrt"
            repo_branch: "main-nss"
            repo_url: "https://github.com/LiBwrt/openwrt-6.x"
            openwrt_file: "IPQ807X-LiBwrt/files"    
            config_file: "IPQ807X-LiBwrt/IPQ807X.config"
            feeds_conf: "IPQ807X-LiBwrt/feeds.conf.default"
            custom_script: "IPQ807X-LiBwrt/diy-script.sh"
            cache_toolchain: "true"

          - model: "MT7981"
            label: "ImmortalWrt-MT798X"
            repo_branch: "openwrt21.02"
            repo_url: "https://github.com/hanwckf/immortalwrt-mt798x"
            openwrt_file: "MT798X-ImmortalWrt/files"    
            config_file: "MT798X-ImmortalWrt/MT7981.config"
            feeds_conf: "MT798X-ImmortalWrt/feeds.conf.default"
            custom_script: "MT798X-ImmortalWrt/diy-script.sh"
            cache_toolchain: "true"

          - model: "MT7986"
            label: "ImmortalWrt-MT798X"
            repo_branch: "openwrt21.02"
            repo_url: "https://github.com/hanwckf/immortalwrt-mt798x"
            openwrt_file: "MT798X-ImmortalWrt/files"    
            config_file: "MT798X-ImmortalWrt/MT7986.config"
            feeds_conf: "MT798X-ImmortalWrt/feeds.conf.default"
            custom_script: "MT798X-ImmortalWrt/diy-script.sh"
            cache_toolchain: "true"
            
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Check Server Performance
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "🔧 SYSTEM INFORMATION"
          echo "════════════════════════════════════════════════════════"
          echo "📊 CPU:"
          echo "   $(grep 'model name' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}')"
          echo "   ⚡ Speed: $(grep 'cpu MHz' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}') MHz"
          echo "   🔢 Cores: $(grep processor /proc/cpuinfo | wc -l)"    
          echo ""
          echo "💾 Memory:"
          free -h | awk '/^Mem:/ {print "   Total: " $2, "| Used: " $3, "| Free: " $4}'
          free -h | awk '/^Swap:/ {print "   Swap:  " $2, "| Used: " $3, "| Free: " $4}'    
          echo ""
          echo "💿 Storage:"
          df -Th / /mnt 2>/dev/null | awk 'NR==1 {print "   " $0} NR>1 {print "   " $0}'    
          echo ""
          echo "🐧 System:"
          lsb_release -a 2>/dev/null | awk '{print "   " $0}'
          echo ""
          echo "🔧 Kernel:"
          echo "   $(uname -a)"    
          echo "════════════════════════════════════════════════════════"

      - name: Initialization Environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-make-openwrt-depends)
          sudo -E systemctl daemon-reload
          #sudo -E apt-get -y full-upgrade
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          timedatectl status || true
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Free Disk Space
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Clone source code
        id: codes
        working-directory: /builder
        if: ${{ steps.init.outputs.status == 'success' && !cancelled() }}
        run: |
          # Clone the source code repository
          git clone -q --single-branch --depth=1 --branch=${{ matrix.repo_branch }} ${{ matrix.repo_url }} openwrt
          ln -sf /builder/openwrt ${{ github.workspace }}/openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          COMMIT_AUTHOR=$(git show -s --date=short --format="作者: %an")
          echo "COMMIT_AUTHOR=$COMMIT_AUTHOR" >> $GITHUB_ENV
          COMMIT_DATE=$(git show -s --date=short --format="时间: %ci")
          echo "COMMIT_DATE=$COMMIT_DATE" >> $GITHUB_ENV
          COMMIT_MESSAGE=$(git show -s --date=short --format="内容: %s")
          echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
          COMMIT_HASH=$(git show -s --date=short --format="hash: %H")
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV

          # Output build
          echo "build_tag=${{ matrix.label }}_${{ matrix.model }}_${{ matrix.repo_branch }}_$(date +"%Y.%m")" >> ${GITHUB_ENV}
          echo -e "REPO_URL: [ ${{ matrix.repo_url }} ]\nREPO_BRANCH: [ ${{ matrix.repo_branch }} ]\nREPO_NAME: [ ${{ matrix.label }} ]"

      - name: Load custom feeds
        run: |
          [[ -f "${{ matrix.feeds_conf }}" ]]
          cp -f ${{ matrix.feeds_conf }} openwrt/feeds.conf.default

      - name: Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [[ -d "${{ matrix.openwrt_file }}" ]] && mv -f ${{ matrix.openwrt_file }} openwrt/files
          [[ -e "${{ matrix.config_file }}" ]] && cp -f ${{ matrix.config_file }} openwrt/.config
          chmod +x ${{ matrix.custom_script }}
          cd openwrt
          ${{ github.workspace }}/${{ matrix.custom_script }}
          ${{ github.workspace }}/General/preset-terminal-tools.sh
          if [[ "${{ matrix.model }}" == "X86_64" || "${{ matrix.model }}" == "Rockchip" ]]; then
            chmod +x ${{ github.workspace }}/General/*.sh
            ${{ github.workspace }}/General/preset-clash-core.sh ${{ matrix.clash_kernel }}
            ${{ github.workspace }}/General/preset-adguard-core.sh ${{ matrix.clash_kernel }}
          fi
          
      - name: Download DL Package
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Cache Toolchain
        if: ${{ matrix.cache_toolchain == 'true' }}
        uses: HiGarfield/cachewrtbuild@main
        with:
          mixkey: ${{ matrix.label }}_${{ matrix.model }}_${{ matrix.repo_branch }}
          prefix: ${{ github.workspace }}/openwrt

      - name: Compile Firmware
        id: compile
        run: |
          # Start compiling
          cd openwrt
          echo -e "Compiling with $(nproc) threads"
          make -j$(nproc) || make -j1 || make -j1 V=s
          cd /bin/targets/*/*

          # Export build metadata
          df -hT ${PWD}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Organize Files
        if: steps.compile.outputs.status == 'success'
        run: |
          mkdir -p rom info
          if [ "${{ matrix.model }}" = "X86_64" ]; then
            cp -a openwrt/bin/targets/x86/*/*-ext4-combined-efi.img.gz rom/
            cp -a openwrt/bin/targets/x86/*/*-squashfs-combined-efi.img.gz rom/
            cp -a openwrt/bin/targets/x86/*/*-generic-rootfs.tar.gz rom/
            cp -a openwrt/bin/targets/x86/*/*-generic.manifest info/manifest.txt
            cp -a openwrt/bin/targets/x86/*/config.buildinfo info/config.buildinfo
            cd rom && sha256sum *gz > ../info/sha256sums.txt
          elif [ "${{ matrix.model }}" = "Rockchip" ]; then
            cp -a openwrt/bin/targets/rockchip/*/*.img.gz rom/
            cp -a openwrt/bin/targets/rockchip/*/*.manifest info/manifest.txt
            cp -a openwrt/bin/targets/rockchip/*/config.buildinfo info/config.buildinfo
            cd rom && sha256sum *gz > ../info/sha256sums.txt
          elif [ "${{ matrix.model }}" = "IPQ60XX" ]; then
            cp -a openwrt/bin/targets/qualcommax/ipq60xx/*.squashfs-sysupgrade.bin rom/
            cp -a openwrt/bin/targets/qualcommax/ipq60xx/*.squashfs-factory.ubi rom/
            cp -a openwrt/bin/targets/qualcommax/ipq60xx/*.manifest info/manifest.txt
            cp -a openwrt/bin/targets/qualcommax/ipq60xx/config.buildinfo info/config.buildinfo
            cd rom && sha256sum * > ../info/sha256sums.txt
          elif [ "${{ matrix.model }}" = "IPQ807X" ]; then
            cp -a openwrt/bin/targets/qualcommax/ipq807x/*.squashfs-sysupgrade.bin rom/
            cp -a openwrt/bin/targets/qualcommax/ipq807x/*.squashfs-factory.ubi rom/
            cp -a openwrt/bin/targets/qualcommax/ipq807x/*.manifest info/manifest.txt
            cp -a openwrt/bin/targets/qualcommax/ipq807x/config.buildinfo info/config.buildinfo
            cd rom && sha256sum * > ../info/sha256sums.txt
          fi
          cd ..
          tar zcf rom/buildinfo_${{ matrix.model }}.tar.gz info
          echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV

      - name: Upload Firmware To Release
        if: steps.compile.outputs.status == 'success'
        uses: ncipollo/release-action@v1
        with:
          name: R${{ env.DATE }} for ${{ matrix.model }}
          allowUpdates: true
          tag: ${{ matrix.model }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ github.workspace }}/rom/*
          body: |
            **This is OpenWrt Firmware for ${{ matrix.model }}**
            ### 📒 固件信息
            - 💻 平台架构: ${{ matrix.model }}
            - ⚽ 固件源码: ${{ matrix.repo_url }}
            - 💝 源码分支: ${{ matrix.repo_branch }}
            - 🚀 内核版本: ${{ env.KERNEL }}
            - 🌐 默认地址: 10.0.0.1
            - 🔑 默认密码: password
            ### 🧊 固件版本
            - 固件编译前最后一次➦[主源码](${{ matrix.repo_url }})更新记录
            - ${{ env.COMMIT_AUTHOR }}
            - ${{ env.COMMIT_DATE }}
            - ${{ env.COMMIT_MESSAGE }}
            - ${{ env.COMMIT_HASH }}
