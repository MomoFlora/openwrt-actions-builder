name: Build releases

on:
  repository_dispatch:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.model }}
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        model: ["X86_64", "Rockchip", "IPQ60XX", "IPQ807X"]
        cache_toolchain: [true]
        include:
          - model: "X86_64"
            label: "X86_64-Lede"
            repo_branch: "master"
            repo_url: "https://github.com/coolsnowwolf/lede"
            config_file: "X86_64-Lede/X86_64.config"
            feeds_conf: "X86_64-Lede/feeds.conf.default"
            custom_script: "X86_64-Lede/diy-script.sh"
            clash_kernel: "amd64"

          - model: "Rockchip"
            label: "Rockchip-Lede"
            repo_branch: "master"
            repo_url: "https://github.com/coolsnowwolf/lede"
            config_file: "Rockchip-Lede/Rockchip.config"
            feeds_conf: "Rockchip-Lede/feeds.conf.default"
            custom_script: "Rockchip-Lede/diy-script.sh"
            clash_kernel: "arm64"

          - model: "IPQ60XX"
            label: "IPQ60XX-LiBwrt"
            repo_branch: "main-nss"
            repo_url: "https://github.com/LiBwrt/openwrt-6.x"
            config_file: "IPQ60XX-LiBwrt/IPQ60XX.config"
            feeds_conf: "IPQ60XX-LiBwrt/feeds.conf.default"
            custom_script: "IPQ60XX-LiBwrt/diy-script.sh"

          - model: "IPQ807X"
            label: "IPQ807X-LiBwrt"
            repo_branch: "main-nss"
            repo_url: "https://github.com/LiBwrt/openwrt-6.x"
            config_file: "IPQ807X-LiBwrt/IPQ807X.config"
            feeds_conf: "IPQ807X-LiBwrt/feeds.conf.default"
            custom_script: "IPQ807X-LiBwrt/diy-script.sh"
        
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Check Server Performance
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "🔧 SYSTEM INFORMATION"
          echo "════════════════════════════════════════════════════════"
          echo "📊 CPU:"
          echo "   $(grep 'model name' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}')"
          echo "   ⚡ Speed: $(grep 'cpu MHz' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}') MHz"
          echo "   🔢 Cores: $(grep processor /proc/cpuinfo | wc -l)"    
          echo ""
          echo "💾 Memory:"
          free -h | awk '/^Mem:/ {print "   Total: " $2, "| Used: " $3, "| Free: " $4}'
          free -h | awk '/^Swap:/ {print "   Swap:  " $2, "| Used: " $3, "| Free: " $4}'    
          echo ""
          echo "💿 Storage:"
          df -Th / /mnt 2>/dev/null | awk 'NR==1 {print "   " $0} NR>1 {print "   " $0}'    
          echo ""
          echo "🐧 System:"
          lsb_release -a 2>/dev/null | awk '{print "   " $0}'
          echo ""
          echo "🔧 Kernel:"
          echo "   $(uname -a)"    
          echo "════════════════════════════════════════════════════════"

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Maximize build space
        uses: MomoFlora/maximize-build-space@master
        with:
          swap-size-mb: 1024
          temp-reserve-mb: 4608
          root-reserve-mb: 3584
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - name: Clone source code
        run: |
          git clone --depth 1 ${{ matrix.repo_url }} -b ${{ matrix.repo_branch }} openwrt
          cd openwrt
          COMMIT_AUTHOR=$(git show -s --date=short --format="作者: %an")
          echo "COMMIT_AUTHOR=$COMMIT_AUTHOR" >> $GITHUB_ENV
          COMMIT_DATE=$(git show -s --date=short --format="时间: %ci")
          echo "COMMIT_DATE=$COMMIT_DATE" >> $GITHUB_ENV
          COMMIT_MESSAGE=$(git show -s --date=short --format="内容: %s")
          echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
          COMMIT_HASH=$(git show -s --date=short --format="hash:哈希值 %H")
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV

      - name: Cache Toolchain
        if: matrix.cache_toolchain
        uses: HiGarfield/cachewrtbuild@main
        with:
          ccache: false
          mixkey: ${{ matrix.label }}-${{ matrix.repo_branch }}
          prefix: ${{ github.workspace }}/openwrt

      - name: Install Feeds
        run: |
          cd openwrt
          cp -f $GITHUB_WORKSPACE/${{ matrix.label }}/feeds.conf.default feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Custom Configuration
        run: |
          [ -e $GITHUB_WORKSPACE/${{ matrix.label }}/files ] && mv files cd openwrt/files
          [ -e ${{ matrix.config_file }} ] && mv ${{ matrix.config_file }} openwrt/.config
          chmod +x ${{ matrix.custom_script }}
          cd openwrt
          $GITHUB_WORKSPACE/${{ matrix.custom_script }}
          if [[ "${{ matrix.model }}" == "X86_64" || "${{ matrix.model }}" == "Rockchip" ]]; then
            chmod +x $GITHUB_WORKSPACE/General/preset-clash-core.sh
            $GITHUB_WORKSPACE/General/preset-clash-core.sh ${{ matrix.clash_kernel }}
          fi

      - name: Download DL Package
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile Firmware
        id: compile
        run: |
          cd openwrt
          mkdir -p files/etc/uci-defaults
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Check Space Usage
        if: (!cancelled())
        run: df -hT
        
      - name: Organize Files
        if: steps.compile.outputs.status == 'success'
        run: |
          mkdir -p rom info
          if [ "${{ matrix.model }}" = "X86_64" ]; then
            cp -a openwrt/bin/targets/x86/*/*-ext4-combined-efi.img.gz rom/
            cp -a openwrt/bin/targets/x86/*/*-squashfs-combined-efi.img.gz rom/
            cp -a openwrt/bin/targets/x86/*/*-generic-rootfs.tar.gz rom/
            cp -a openwrt/bin/targets/x86/*/*-generic.manifest info/manifest.txt
            cp -a openwrt/bin/targets/x86/*/config.buildinfo info/config.buildinfo
            cd rom && sha256sum *gz > ../info/sha256sums.txt
          elif [ "${{ matrix.model }}" = "Rockchip" ]; then
            cp -a openwrt/bin/targets/rockchip/*/*.img.gz rom/
            cp -a openwrt/bin/targets/rockchip/*/*.manifest info/manifest.txt
            cp -a openwrt/bin/targets/rockchip/*/config.buildinfo info/config.buildinfo
            cd rom && sha256sum *gz > ../info/sha256sums.txt
          elif [ "${{ matrix.model }}" = "IPQ60XX" ]; then
            cp -a openwrt/bin/targets/qualcommax/ipq60xx/*.squashfs-sysupgrade.bin rom/
            cp -a openwrt/bin/targets/qualcommax/ipq60xx/*.squashfs-factory.ubi rom/
            cp -a openwrt/bin/targets/qualcommax/ipq60xx/*.manifest info/manifest.txt
            cp -a openwrt/bin/targets/qualcommax/ipq60xx/config.buildinfo info/config.buildinfo
            cd rom && sha256sum *gz > ../info/sha256sums.txt
          elif [ "${{ matrix.model }}" = "IPQ807X" ]; then
            cp -a openwrt/bin/targets/qualcommax/ipq807x/*.squashfs-sysupgrade.bin rom/
            cp -a openwrt/bin/targets/qualcommax/ipq807x/*.squashfs-factory.ubi rom/
            cp -a openwrt/bin/targets/qualcommax/ipq807x/*.manifest info/manifest.txt
            cp -a openwrt/bin/targets/qualcommax/ipq807x/config.buildinfo info/config.buildinfo
            cd rom && sha256sum *gz > ../info/sha256sums.txt
          fi
          cd ..
          tar zcf rom/buildinfo_${{ matrix.model }}.tar.gz info

      - name: Upload Firmware To Release
        if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
        uses: ncipollo/release-action@v1
        with:
          name: R${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
          allowUpdates: true
          tag: ${{ env.FIRMWARE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ env.FIRMWARE_PATH }}/*
          body: |
            **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**
            ### 📒 固件信息
            - 💻 平台架构: ${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}
            - ⚽ 固件源码: ${{ env.REPO_URL }}
            - 💝 源码分支: ${{ env.REPO_BRANCH }}
            - 🚀 内核版本: ${{ env.KERNEL }}
            - 🌐 默认地址: 10.0.0.1
            - 🔑 默认密码: password
            ### 🧊 固件版本
            - 固件编译前最后一次➦[主源码](${{ env.REPO_URL }})更新记录
            - ${{ env.COMMIT_AUTHOR }}
            - ${{ env.COMMIT_DATE }}
            - ${{ env.COMMIT_MESSAGE }}
            - ${{ env.COMMIT_HASH }}
