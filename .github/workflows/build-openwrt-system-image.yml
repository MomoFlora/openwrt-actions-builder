name: Build OpenWrt system image

on:
  workflow_dispatch:
#  schedule:
#    - cron: 0 19 * * *
    inputs:
      device:
        description: 'Select the build device'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - 'friendlyarm_nanopc-t4'
          - 'friendlyarm_nanopc-t6'
          - 'friendlyarm_nanopi-m5'
          - 'friendlyarm_nanopi-neo3'
          - 'friendlyarm_nanopi-r2c'
          - 'friendlyarm_nanopi-r2c-plus'
          - 'friendlyarm_nanopi-r2s'
          - 'friendlyarm_nanopi-r2s-plus'
          - 'friendlyarm_nanopi-r3s'
          - 'friendlyarm_nanopi-r4s'
          - 'friendlyarm_nanopi-r4se'
          - 'friendlyarm_nanopi-r5c'
          - 'friendlyarm_nanopi-r5s'
          - 'friendlyarm_nanopi-r6c'
          - 'friendlyarm_nanopi-r6s'
          - 'friendlyarm_nanopi-r76s'
          - 'linkease_easepi-r1'
          - 'fastrhino_r66s'
          - 'fastrhino_r68s'
          - 'nlnet_xiguapi-v3'
          - 'radxa_cm3-io'
          - 'radxa_e20c'
          - 'radxa_e25'
          - 'radxa_e52c'
          - 'radxa_rock-2a'
          - 'radxa_rock-2f'
          - 'radxa_rock-3a'
          - 'radxa_rock-3b'
          - 'radxa_rock-3c'
          - 'radxa_rock-4c-plus'
          - 'radxa_rock-4d'
          - 'radxa_rock-4se'
          - 'radxa_rock-5-itx'
          - 'radxa_rock-5a'
          - 'radxa_rock-5b'
          - 'radxa_rock-5b-plus'
          - 'radxa_rock-5c'
          - 'radxa_rock-5t'
          - 'radxa_rock-pi-4a'
          - 'radxa_rock-pi-e'
          - 'radxa_rock-pi-s'
          - 'radxa_zero-3e'
          - 'radxa_zero-3w'
          - 'xunlong_orangepi-5'
          - 'xunlong_orangepi-5-plus'
          - 'xunlong_orangepi-r1-plus'
          - 'xunlong_orangepi-r1-plus-lts' 
          - 'x86_64'
      lan_addr:
        description: 'Setting default LAN address'
        required: true
        default: '10.0.0.1'
        type: string
      root_password:
        description: 'Setting default root password (Optional, No password by default)'
        required: false
        default: ''
        type: string
        
env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: configs/${{ github.event.inputs.device }}
  DIY_SCRIPT: diy-script.sh
  CACHE_TOOLCHAIN: true
  FIRMWARE_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build ${{ github.event.inputs.device }}
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    defaults:
      run:
        shell: bash
        
    steps:
    - name: Check Server Performance
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号(降序): 7763，8370C，8272CL，8171M，E5-2673\n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo "CPU核心数量: $(nproc)"
        echo -e "CPU型号信息:$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')\n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息:"
        echo -e "$(sudo lshw -short -C memory | grep GiB)\n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        docker rmi -f $(docker images -q) 2>/dev/null || true
        sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
        sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
        sudo -E apt-get -y update
        sudo -E apt-get -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean
        sudo timedatectl set-timezone "$TZ"

    - name: Maximize build space
      uses: MomoFlora/maximize-build-space@master
      with:
        swap-size-mb: 1024
        temp-reserve-mb: 4608
        root-reserve-mb: 3584
        remove-dotnet: "true"
        remove-android: "true"
        remove-haskell: "true"
        remove-codeql: "true"
